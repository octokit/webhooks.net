name: Release Drafter

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions: {}

jobs:
  update_release_draft:
    permissions:
      contents: write
      pull-requests: read
    runs-on: ubuntu-latest
    steps:
      - uses: release-drafter/release-drafter@73b95fa1c286dfd6802a4f949b07dad6149f2b0f # v7.5.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
